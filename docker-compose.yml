services:
  hypermail-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HYPERMAIL_PORT:-3090}:3000"
    environment:
      - HYPERMAIL_MCP_KEY=${HYPERMAIL_MCP_KEY}
    volumes:
      - hypermail-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/mcp',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hypermail-data:
